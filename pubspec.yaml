name: fuel_tracker_app
description: Premium fuel & GPS tracker with OpenStreetMap and iOS-style dashboard.
publish_to: "none"

version: 2.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  flutter_map: ^7.0.2
  flutter_map_animations: ^0.7.1
  flutter_map_marker_cluster: ^1.4.0
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  flutter_local_notifications: ^17.2.4
  flutter_animate: ^4.5.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
